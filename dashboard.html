<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Life Dashboard</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:monospace;background:#0a0a0a;color:#eee;padding:1.5rem}

.topbar{display:flex;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:10px}
.logo{font-size:20px}
.tagline{font-size:11px;color:#555}

.conn-row{display:flex;gap:8px;align-items:center}

input{
  width:280px;
  padding:6px;
  background:#111;
  border:1px solid #333;
  color:#eee;
}

.btn{
  padding:6px 14px;
  border:1px solid #333;
  background:#111;
  color:#eee;
  cursor:pointer;
}

.btn.active{background:#eee;color:#000}

.dot{width:8px;height:8px;border-radius:50%;background:#444}
.dot.on{background:#3B6D11}

.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:10px}

.card{
  background:#111;
  border:1px solid #222;
  padding:10px;
  border-radius:10px;
}

.map{height:250px;margin-bottom:10px}

img{
  width:100%;
  border-radius:10px;
  border:1px solid #222;
}
</style>
</head>

<body>

<div class="topbar">
  <div>
    <div class="logo">LIFE DASHBOARD</div>
    <div class="tagline">live iphone telemetry</div>
  </div>

  <div class="conn-row">
    <input id="relayInput" value="wss://phone-relay-production.up.railway.app"/>
    <button id="connBtn" class="btn" onclick="toggleConn()">CONNECT</button>
    <span id="dot" class="dot"></span>
    <span id="connLabel">OFFLINE</span>
  </div>
</div>

<div id="lastSeen">no data yet</div>

<div class="grid">
  <div class="card">BATTERY: <span id="v-bat">—</span></div>
  <div class="card">STEPS: <span id="v-steps">—</span></div>
  <div class="card">NOISE: <span id="v-noise">—</span></div>
  <div class="card">PING: <span id="v-ping">—</span></div>
</div>

<div id="mapEl" class="map"></div>

<div class="card">
  <div>CAMERA: <span id="v-cam">not active</span></div>
  <img id="camFeed"/>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

<script>
let ws=null,map=null,marker=null,connected=false;

function toggleConn(){
  if(connected){
    ws.close();
    return;
  }

  const url=document.getElementById('relayInput').value;
  ws=new WebSocket(url);

  ws.onopen=()=>{
    connected=true;
    document.getElementById('dot').classList.add("on");
    document.getElementById('connLabel').textContent="LIVE";
    document.getElementById('connBtn').textContent="DISCONNECT";
    document.getElementById('connBtn').classList.add("active");
  };

  ws.onmessage=(e)=>{
    let msg;
    try{
      msg=JSON.parse(e.data);
    }catch{
      return;
    }

    // 📷 CAMERA
    if(msg.type==="camera"){
      document.getElementById('camFeed').src = msg.data;
      document.getElementById('v-cam').textContent = "LIVE";
      return;
    }

    // 📊 SENSOR
    if(msg.type==="sensor"){
      const d=msg.payload;

      if(d.battery!=null)
        document.getElementById('v-bat').textContent=d.battery+"%";

      if(d.steps!=null)
        document.getElementById('v-steps').textContent=d.steps;

      if(d.noise!=null)
        document.getElementById('v-noise').textContent=d.noise;

      if(msg.ts)
        document.getElementById('v-ping').textContent=(Date.now()-msg.ts)+"ms";

      document.getElementById('lastSeen').textContent=
        "last: "+new Date().toLocaleTimeString();

      if(d.gps){
        const lat=parseFloat(d.gps.lat);
        const lng=parseFloat(d.gps.lng);

        if(!map){
          map=L.map("mapEl").setView([lat,lng],15);

          L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png")
            .addTo(map);

          marker=L.marker([lat,lng]).addTo(map);
        }else{
          marker.setLatLng([lat,lng]);
          map.panTo([lat,lng]);
        }
      }
    }
  };

  ws.onclose=()=>{
    connected=false;
    document.getElementById('dot').classList.remove("on");
    document.getElementById('connLabel').textContent="OFFLINE";
    document.getElementById('connBtn').textContent="CONNECT";
    document.getElementById('connBtn').classList.remove("active");
  };
}
</script>

</body>
</html>
