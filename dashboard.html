<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Restored Font Styles */
        body {
            font-family: 'Arial', sans-serif;
            line-height: 1.6;
        }
        /* Improved Card Layout and Semantic Structure */
        .card {
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            padding: 20px;
            margin: 15px;
        }
        /* Pulse Animation */
        .pulse {
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <header>
        <h1>Dashboard</h1>
    </header>
    <main>
        <section class="cards">
            <div class="card pulse">
                <h2>Card Title</h2>
                <p>Card description goes here.</p>
            </div>
            <div class="card">
                <h2>Another Card</h2>
                <p>Details of another card.</p>
            </div>
        </section>
    </main>
    <footer>
        <p>© 2026 CodeMaster2099. All Rights Reserved.</p>
    </footer>
</body>
</html>
