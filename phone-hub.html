<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Phone Hub</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:monospace;background:#0a0a0a;color:#eee;padding:1.5rem 1rem;max-width:420px;margin:0 auto}
h1{font-size:22px;font-weight:500;letter-spacing:0.05em;text-align:center}
.sub{font-size:11px;color:#666;letter-spacing:0.08em;text-align:center;margin-bottom:1.5rem;margin-top:4px}
.status-bar{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:1.5rem;padding:10px 16px;background:#111;border-radius:12px;border:0.5px solid #222}
.dot{width:8px;height:8px;border-radius:50%;background:#444;flex-shrink:0}
.dot.on{background:#3B6D11;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.status-text{font-size:12px;color:#888;letter-spacing:0.06em}
.box{background:#111;border:0.5px solid #222;border-radius:10px;padding:12px 14px;margin-bottom:1rem}
.label{font-size:10px;color:#555;letter-spacing:0.1em;margin-bottom:6px}
input[type=url]{width:100%;background:#0a0a0a;border:0.5px solid #333;color:#eee;font-family:monospace;font-size:12px;padding:8px 10px;border-radius:8px;margin-bottom:8px}
.btn{width:100%;padding:13px;font-family:monospace;font-size:13px;letter-spacing:0.08em;border-radius:10px;cursor:pointer;border:0.5px solid #333;background:#0a0a0a;color:#eee;margin-bottom:8px}
.btn.primary{background:#eee;color:#0a0a0a;border-color:transparent}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1rem}
.card{background:#111;border:0.5px solid #222;border-radius:12px;padding:12px}
.card .label{font-size:10px;color:#555;letter-spacing:0.1em;margin-bottom:4px}
.val{font-size:15px;font-weight:500;color:#eee}
.val.sm{font-size:12px}
.perm-list{display:flex;flex-direction:column;gap:8px;margin-bottom:1rem}
.perm-row{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:#111;border:0.5px solid #222;border-radius:8px}
.perm-name{font-size:13px}
.badge{font-size:11px;padding:3px 8px;border-radius:99px}
.badge.ok{background:#1a2e1a;color:#5a9e5a}
.badge.pending{background:#2e2a1a;color:#9e8a3a}
.badge.denied{background:#2e1a1a;color:#9e4a4a}
.noise-bar{height:6px;background:#222;border-radius:3px;overflow:hidden;margin-top:8px}
.noise-fill{height:100%;background:#185FA5;width:0%;border-radius:3px;transition:width 0.1s}
</style>
</head>
<body>
<h1>PHONE HUB</h1>
<div class="sub">sensor broadcast terminal</div>

<div class="status-bar">
  <div class="dot" id="connDot"></div>
  <div class="status-text" id="connStatus">DISCONNECTED</div>
</div>

<div class="box">
  <div class="label">RELAY SERVER</div>
  <input type="url" id="wsInput" placeholder="wss://phone-relay-production.up.railway.app" value="wss://phone-relay-production.up.railway.app"/>
  <button class="btn primary" onclick="connect()">CONNECT</button>
</div>

<div class="perm-list">
  <div class="perm-row"><span class="perm-name">GPS location</span><span class="badge pending" id="p-gps">PENDING</span></div>
  <div class="perm-row"><span class="perm-name">Motion sensors</span><span class="badge pending" id="p-motion">PENDING</span></div>
  <div class="perm-row"><span class="perm-name">Microphone</span><span class="badge pending" id="p-mic">PENDING</span></div>
  <div class="perm-row"><span class="perm-name">Battery</span><span class="badge pending" id="p-bat">PENDING</span></div>
</div>

<button class="btn" onclick="requestAll()">REQUEST ALL PERMISSIONS</button>

<div class="grid" style="margin-top:1rem">
  <div class="card"><div class="label">GPS</div><div class="val sm" id="v-gps">—</div></div>
  <div class="card"><div class="label">BATTERY</div><div class="val" id="v-bat">—</div></div>
  <div class="card"><div class="label">STEPS</div><div class="val" id="v-steps">—</div></div>
  <div class="card"><div class="label">TILT X / Y</div><div class="val sm" id="v-tilt">—</div></div>
  <div class="card" style="grid-column:span 2">
    <div class="label">NOISE LEVEL</div>
    <div class="val" id="v-noise">—</div>
    <div class="noise-bar"><div class="noise-fill" id="noise-fill"></div></div>
  </div>
</div>

<script>
let ws=null,steps=0,lastAcc=null,audioCtx=null,analyser=null;
const data={gps:null,battery:null,steps:0,tilt:{x:0,y:0},noise:0};

function setPerm(id,state){
  const el=document.getElementById('p-'+id);
  el.className='badge '+(state==='ok'?'ok':state==='denied'?'denied':'pending');
  el.textContent=state.toUpperCase();
}

function connect(){
  const url=document.getElementById('wsInput').value.trim();
  if(!url)return;
  ws=new WebSocket(url);
  ws.onopen=()=>{
    document.getElementById('connDot').className='dot on';
    document.getElementById('connStatus').textContent='LIVE — BROADCASTING';
    setInterval(()=>{if(ws&&ws.readyState===1)ws.send(JSON.stringify({type:'data',payload:data,ts:Date.now()}));},500);
  };
  ws.onclose=()=>{
    document.getElementById('connDot').className='dot';
    document.getElementById('connStatus').textContent='DISCONNECTED';
  };
  ws.onerror=()=>{
    document.getElementById('connStatus').textContent='ERROR — check URL';
  };
}

async function requestAll(){
  // GPS
  if(navigator.geolocation){
    navigator.geolocation.watchPosition(pos=>{
      data.gps={lat:pos.coords.latitude.toFixed(5),lng:pos.coords.longitude.toFixed(5)};
      document.getElementById('v-gps').textContent=data.gps.lat+', '+data.gps.lng;
      setPerm('gps','ok');
    },()=>setPerm('gps','denied'),{enableHighAccuracy:true});
  }

  // Motion
  if(typeof DeviceMotionEvent!=='undefined'&&typeof DeviceMotionEvent.requestPermission==='function'){
    try{
      const res=await DeviceMotionEvent.requestPermission();
      if(res==='granted'){window.addEventListener('devicemotion',handleMotion);setPerm('motion','ok');}
      else setPerm('motion','denied');
    }catch(e){setPerm('motion','denied');}
  } else {
    window.addEventListener('devicemotion',handleMotion);
    setPerm('motion','ok');
  }

  // Mic
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true,video:false});
    audioCtx=new AudioContext();
    analyser=audioCtx.createAnalyser();
    analyser.fftSize=256;
    audioCtx.createMediaStreamSource(stream).connect(analyser);
    setPerm('mic','ok');
    monitorNoise();
  }catch(e){setPerm('mic','denied');}

  // Battery
  if(navigator.getBattery){
    const bat=await navigator.getBattery();
    data.battery=Math.round(bat.level*100);
    document.getElementById('v-bat').textContent=data.battery+'%';
    setPerm('bat','ok');
    bat.addEventListener('levelchange',()=>{
      data.battery=Math.round(bat.level*100);
      document.getElementById('v-bat').textContent=data.battery+'%';
    });
  } else setPerm('bat','denied');
}

function handleMotion(e){
  const a=e.accelerationIncludingGravity;
  if(!a)return;
  data.tilt={x:a.x?a.x.toFixed(1):0,y:a.y?a.y.toFixed(1):0};
  document.getElementById('v-tilt').textContent=data.tilt.x+' / '+data.tilt.y;
  if(lastAcc){
    const diff=Math.abs(a.x-lastAcc.x)+Math.abs(a.y-lastAcc.y)+Math.abs(a.z-lastAcc.z);
    if(diff>15){steps++;data.steps=steps;document.getElementById('v-steps').textContent=steps;}
  }
  lastAcc={x:a.x,y:a.y,z:a.z};
}

function monitorNoise(){
  const buf=new Uint8Array(analyser.frequencyBinCount);
  function tick(){
    analyser.getByteFrequencyData(buf);
    const avg=Math.round(buf.reduce((a,b)=>a+b,0)/buf.length);
    data.noise=avg;
    document.getElementById('v-noise').textContent=avg+' dB~';
    document.getElementById('noise-fill').style.width=Math.min(avg*2,100)+'%';
    requestAnimationFrame(tick);
  }
  tick();
}
</script>
</body>
</html>
