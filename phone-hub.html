<script>
let ws=null,steps=0,lastAcc=null,audioCtx=null,analyser=null;
let cameraStarted = false;

const data={gps:null,battery:null,steps:0,tilt:{x:0,y:0},noise:0};

function setPerm(id,state){
  const el=document.getElementById('p-'+id);
  el.className='badge '+(state==='ok'?'ok':state==='denied'?'denied':'pending');
  el.textContent=state.toUpperCase();
}

function connect(){
  const url=document.getElementById('wsInput').value.trim();
  if(!url)return;

  ws=new WebSocket(url);

  ws.onopen=()=>{
    document.getElementById('connDot').className='dot on';
    document.getElementById('connStatus').textContent='LIVE — BROADCASTING';

    startSending();   // ✅ FIXED
    startCamera();    // 🔥 NEW
  };

  ws.onclose=()=>{
    document.getElementById('connDot').className='dot';
    document.getElementById('connStatus').textContent='DISCONNECTED';
  };

  ws.onerror=()=>{
    document.getElementById('connStatus').textContent='ERROR — check URL';
  };
}

/* =========================
   🔥 SEND LOOP (FIXED)
========================= */
function startSending(){
  setInterval(()=>{
    if(ws && ws.readyState===1){
      ws.send(JSON.stringify({
        type:'sensor',
        payload:data,
        ts:Date.now()
      }));
    }
  },300);
}

/* =========================
   📷 CAMERA STREAM
========================= */
async function startCamera(){
  if(cameraStarted) return;
  cameraStarted = true;

  try{
    const video=document.createElement("video");
    video.autoplay=true;
    video.playsInline=true;

    const canvas=document.createElement("canvas");
    canvas.width=320;
    canvas.height=240;
    const ctx=canvas.getContext("2d");

    const stream=await navigator.mediaDevices.getUserMedia({video:true});
    video.srcObject=stream;

    setInterval(()=>{
      if(!ws || ws.readyState!==1) return;

      ctx.drawImage(video,0,0,canvas.width,canvas.height);
      const frame=canvas.toDataURL("image/jpeg",0.5);

      ws.send(JSON.stringify({
        type:"camera",
        data:frame
      }));
    },200);

  }catch(e){
    console.log("camera denied");
  }
}

/* =========================
   📍 PERMISSIONS + SENSORS
========================= */
async function requestAll(){
  // GPS
  if(navigator.geolocation){
    navigator.geolocation.watchPosition(pos=>{
      data.gps={
        lat:pos.coords.latitude.toFixed(5),
        lng:pos.coords.longitude.toFixed(5)
      };
      document.getElementById('v-gps').textContent=data.gps.lat+', '+data.gps.lng;
      setPerm('gps','ok');
    },()=>setPerm('gps','denied'),{enableHighAccuracy:true});
  }

  // Motion
  if(typeof DeviceMotionEvent!=='undefined'&&typeof DeviceMotionEvent.requestPermission==='function'){
    try{
      const res=await DeviceMotionEvent.requestPermission();
      if(res==='granted'){
        window.addEventListener('devicemotion',handleMotion);
        setPerm('motion','ok');
      } else setPerm('motion','denied');
    }catch(e){setPerm('motion','denied');}
  } else {
    window.addEventListener('devicemotion',handleMotion);
    setPerm('motion','ok');
  }

  // Mic
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    audioCtx=new AudioContext();
    analyser=audioCtx.createAnalyser();
    analyser.fftSize=256;
    audioCtx.createMediaStreamSource(stream).connect(analyser);
    setPerm('mic','ok');
    monitorNoise();
  }catch(e){setPerm('mic','denied');}

  // Battery
  if(navigator.getBattery){
    const bat=await navigator.getBattery();
    data.battery=Math.round(bat.level*100);
    document.getElementById('v-bat').textContent=data.battery+'%';
    setPerm('bat','ok');

    bat.addEventListener('levelchange',()=>{
      data.battery=Math.round(bat.level*100);
      document.getElementById('v-bat').textContent=data.battery+'%';
    });
  } else setPerm('bat','denied');
}

/* =========================
   📐 MOTION
========================= */
function handleMotion(e){
  const a=e.accelerationIncludingGravity;
  if(!a)return;

  data.tilt={
    x:a.x?a.x.toFixed(1):0,
    y:a.y?a.y.toFixed(1):0
  };

  document.getElementById('v-tilt').textContent=data.tilt.x+' / '+data.tilt.y;

  if(lastAcc){
    const diff=Math.abs(a.x-lastAcc.x)+Math.abs(a.y-lastAcc.y)+Math.abs(a.z-lastAcc.z);
    if(diff>15){
      steps++;
      data.steps=steps;
      document.getElementById('v-steps').textContent=steps;
    }
  }

  lastAcc={x:a.x,y:a.y,z:a.z};
}

/* =========================
   🔊 NOISE
========================= */
function monitorNoise(){
  const buf=new Uint8Array(analyser.frequencyBinCount);

  function tick(){
    analyser.getByteFrequencyData(buf);
    const avg=Math.round(buf.reduce((a,b)=>a+b,0)/buf.length);

    data.noise=avg;
    document.getElementById('v-noise').textContent=avg+' dB~';
    document.getElementById('noise-fill').style.width=Math.min(avg*2,100)+'%';

    requestAnimationFrame(tick);
  }

  tick();
}
</script>
